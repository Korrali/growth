name: Scheduled E2E — Growth Prod

on:
  schedule:
    - cron: "15 6 * * *"  # 01:15 AM Chicago (CDT/UTC-5)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  e2e-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
        working-directory: apps/web

      - name: Google OAuth probe → redirect (not 500)
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            --max-redirs 0 https://growth.korrali.com/api/auth/signin/google || echo "000")
          [[ "$STATUS" == "302" || "$STATUS" == "303" || "$STATUS" == "200" ]] \
            || (echo "Google auth broken: $STATUS" && exit 1)

      - name: Run Playwright E2E suite against prod
        env:
          E2E_BASE_URL: https://growth.korrali.com
          E2E_SESSION_TOKEN: ${{ secrets.E2E_SESSION_TOKEN }}
        run: |
          pnpm exec playwright test \
            --project=chromium \
            --reporter=list
        working-directory: apps/web

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: growth-playwright-report-${{ github.run_id }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Open GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## Nightly E2E failure — Growth prod',
              '',
              `**Run:** [#${context.runId}](${runUrl})`,
              `**Date:** ${new Date().toISOString().slice(0,10)}`,
              '',
              '### What to check',
              '- [ ] Review Playwright report artifact attached to the run',
              '- [ ] Check Google OAuth probe on growth.korrali.com',
              '- [ ] Check campaign/contact/inbox routes',
              '',
              '> Bring this issue into a Claude Code session: *"fix the failing nightly E2E tests"*',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[E2E] Nightly test failure — ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ['e2e-failure', 'bug'],
            });
