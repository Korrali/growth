name: Deploy Growth Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY-PROD to confirm'
        required: true
        type: string

concurrency:
  group: deploy-growth-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DEPLOY-PROD'
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Rsync code to Prod directory on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh "ec2-user@${EC2_HOST}" 'mkdir -p /home/ec2-user/growth/prod'
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.env*' \
            ./ "ec2-user@${EC2_HOST}:/home/ec2-user/growth/prod/"

      - name: Install, migrate, build, restart (Prod)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh "ec2-user@${EC2_HOST}" bash <<'REMOTE_EOF'
            set -euo pipefail
            source ~/.nvm/nvm.sh
            nvm use default

            cd /home/ec2-user/growth/prod/apps/web

            ln -sf /home/ec2-user/growth/.env.production .env

            pnpm install --frozen-lockfile
            pnpm exec prisma generate
            pnpm exec prisma migrate resolve --applied 0_init 2>/dev/null || true
            pnpm exec prisma migrate deploy
            pnpm build

            pm2 delete growth-web-prod 2>/dev/null || true
            pm2 delete growth-worker-prod 2>/dev/null || true
            pm2 start /home/ec2-user/growth/prod/infra/ecosystem.growth.config.js \
              --only growth-web-prod,growth-worker-prod --update-env
            pm2 save
          REMOTE_EOF

      - name: Smoke check (PM2 + HTTP)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh "ec2-user@${EC2_HOST}" \
            "pm2 list | grep growth-web-prod | grep -q online && pm2 list | grep growth-worker-prod | grep -q online" \
            && echo "Prod pm2: web+worker ONLINE" \
            || (echo "Prod pm2: web or worker NOT ONLINE" && exit 1)
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://growth.korrali.com/login || echo "000")
          [ "$STATUS" = "200" ] \
            && echo "Prod HTTP: $STATUS" \
            || (echo "Prod HTTP: $STATUS (expected 200)" && exit 1)

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for app ready (up to 60s)
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://growth.korrali.com/login || echo "000")
            echo "Attempt $i: /login → $STATUS"
            [ "$STATUS" = "200" ] && break
            sleep 5
          done
          [ "$STATUS" = "200" ] || (echo "App never came up" && exit 1)

      - name: Google OAuth probe returns redirect (not 500)
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            --max-redirs 0 https://growth.korrali.com/api/auth/signin/google || echo "000")
          echo "/api/auth/signin/google → $STATUS"
          [[ "$STATUS" == "302" || "$STATUS" == "303" || "$STATUS" == "200" ]] \
            || (echo "Google auth broken: $STATUS" && exit 1)

      - name: Protected routes redirect (not 500)
        run: |
          for path in /growth /growth/campaigns /growth/contacts /growth/inbox /growth/clients /growth/settings; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://growth.korrali.com$path)
            echo "$path → $STATUS"
            [[ "$STATUS" == "200" || "$STATUS" == "307" || "$STATUS" == "302" ]] \
              || (echo "Unexpected $STATUS for $path" && exit 1)
          done

      - name: API auth gates return 401/403
        run: |
          for path in /api/campaigns /api/contacts /api/companies /api/inbox /api/clients; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://growth.korrali.com$path)
            echo "$path → $STATUS"
            [[ "$STATUS" == "401" || "$STATUS" == "403" || "$STATUS" == "404" ]] \
              || (echo "Unprotected or broken: $path → $STATUS" && exit 1)
          done

      - name: Run Playwright smoke suite against prod
        env:
          E2E_BASE_URL: https://growth.korrali.com
        run: |
          cd apps/web
          pnpm install --frozen-lockfile
          pnpm exec playwright install chromium --with-deps
          pnpm exec playwright test \
            src/e2e/auth.spec.ts \
            src/e2e/app-routes.spec.ts \
            --project=chromium \
            --grep "auth gates|public routes|public API" \
            --reporter=list
